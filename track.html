@keyframes fadeUp{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}

</style>

<body>
<div class="wrap">
  <div class="site-hdr">
    <div class="brand">
      <div class="brand-ico">🚚</div>
      <div><h1>المسار السريع</h1><p>تتبع شحنتك بسهولة</p></div>
    </div>
    <a href="index.html" class="hdr-login">🔑 تسجيل الدخول</a>
  </div>
  <div class="search-card">
    <h2>📡 تتبع شحنتك</h2>
    <p>أدخل رقم التتبع لمعرفة مكان شحنتك الآن</p>
    <div class="search-row">
      <input type="text" id="sinp" class="sinp" placeholder="مثال: AD-SN-000001" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="sbtn" id="sbtn" onclick="doSearch()">🔍 تتبع</button>
    </div>
  </div>
  <div id="result-area"></div>
  <div class="site-ftr">المسار السريع — جميع الحقوق محفوظة © 2025</div>
</div>
<script type="module">
const sb=window._sb;
const QR=window.AlMasarQR;
const STATUS_FLOW=[
  {key:'pending',icon:'⏳',label:'استلام',sub:'في انتظار الاستلام من المرسل'},
  {key:'picked_up',icon:'🏢',label:'بالفرع',sub:'الشحنة في الفرع — بانتظار التسليم للعميل أو الإرسال للفرع التالي'},
  {key:'in_transit',icon:'🚚',label:'بالطريق',sub:'الشحنة في طريقها إليك'},
  {key:'delivered',icon:'🏁',label:'تسليم',sub:'تم تسليم الشحنة بنجاح'},
];
const STATUS_META={
  pending:{label:'قيد الانتظار',color:'#fbbf24',cls:'pending'},
  picked_up:{label:'وصل الفرع / تم الاستلام',color:'#60a5fa',cls:'picked_up'},
  in_transit:{label:'في الطريق',color:'#c084fc',cls:'in_transit'},
  delivered:{label:'تم التسليم',color:'#34d399',cls:'delivered'},
  cancelled:{label:'ملغية',color:'#f87171',cls:'cancelled'},
};
const PAY_AR={cash_sender:'نقد من المرسل',cash_receiver:'الدفع عند الاستلام',prepaid:'مدفوع مسبقاً'};
const DELIVERY_AR={branch:'استلام من الفرع',door:'توصيل للباب'};
// نقطة 23: مدة صلاحية رابط التتبع بعد التسليم
const TRACKING_EXPIRY_HOURS=24; // نقطة 9: صلاحية 24 ساعة بعد التسليم

let currentShip=null,realtimeCh=null;
const urlP=new URLSearchParams(location.search);
const paramT=urlP.get('t')||urlP.get('tracking');
if(paramT){document.getElementById('sinp').value=paramT.toUpperCase();doSearch();}
document.getElementById('sinp').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

window.doSearch=async function(){
  const q=document.getElementById('sinp').value.trim().toUpperCase();if(!q)return;
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='...';
  showLoading();
  await searchByTracking(q);
  btn.disabled=false;btn.textContent='🔍 تتبع';
};

async function searchByTracking(tn){
  // نقطة 5: لا نجلب بيانات السائق الحساسة — فقط اسمه بدون هاتفه
  const{data,error}=await sb.from('shipments').select(`
    id,tracking_number,status,sender_name,
    receiver_name,receiver_address,
    status,created_at,shipping_cost,payment_method,
    notes,delivery_type,delivered_at,delivery_proof_id,
    route_notes,
    origin:origin_branch_id(name,city),
    destination:destination_branch_id(name,city)
  `).ilike('tracking_number',tn).single();
  if(error||!data){showEmpty(tn);return;}

  // نقطة 23: فحص انتهاء صلاحية رابط التتبع للشحنات المُسلَّمة
  if(data.status==='delivered'&&data.delivered_at){
    const deliveredDate=new Date(data.delivered_at);
    const expiryDate=new Date(deliveredDate.getTime()+TRACKING_EXPIRY_HOURS*60*60*1000);
    if(new Date()>expiryDate){
      showExpired(tn,deliveredDate);return;
    }
  }

  currentShip=data;
  const[logsRes,routeRes,proofRes]=await Promise.all([
    sb.from('tracking_logs').select('status,location_note,created_at').eq('shipment_id',data.id).order('created_at',{ascending:false}),
    sb.from('shipment_routes').select('branch_name,sequence,status,arrived_at').eq('shipment_id',data.id).order('sequence'),
    data.delivery_proof_id
      ?sb.from('delivery_proofs').select('receiver_name,created_at,notes').eq('id',data.delivery_proof_id).single()
      :Promise.resolve({data:null}),
  ]);
  renderShipment(data,logsRes.data||[],routeRes.data||[],proofRes.data);
  subscribeShipment(data.id);
}

function renderShipment(ship,logs,route,proof){
  const meta=STATUS_META[ship.status]||STATUS_META['pending'];
  const idx=STATUS_FLOW.findIndex(s=>s.key===ship.status);
  const fillPct=ship.status==='cancelled'?0:ship.status==='delivered'?100:idx<0?0:Math.round((idx/(STATUS_FLOW.length-1))*100);

  const tlSteps=ship.status==='cancelled'
    ?'<div class="step"><div class="step-dot cancelled">❌</div><span class="step-lbl active">ملغية</span></div>'
    :STATUS_FLOW.map((s,i)=>{
        const done=i<idx||ship.status==='delivered';
        const active=i===idx&&ship.status!=='delivered';
        const cls=done?'done':active?'active':'';
        const logEntry=logs.find(l=>l.status===s.key);
        const time=logEntry?fmtDateShort(logEntry.created_at):'';
        return`<div class="step"><div class="step-dot ${cls}">${done?'✓':s.icon}</div><span class="step-lbl ${cls}">${s.label}</span>${time?`<span class="step-time">${time}</span>`:''}</div>`;
      }).join('');

  const logsHtml=logs.length
    ?logs.map(l=>{
        // نقطة 5: إخفاء ملاحظات audit trail الداخلية عن العميل
        const note=l.location_note&&!l.location_note.includes('السائق:')&&!l.location_note.includes('من pending')&&!l.location_note.includes('من picked_up')&&!l.location_note.includes('من in_transit')
          ?l.location_note:null;
        return`<div class="log-item"><div class="log-dot" style="background:${STATUS_META[l.status]?.color||'#64748b'}"></div><div class="log-body"><div class="log-status" style="color:${STATUS_META[l.status]?.color||'#e2e8f0'};">${STATUS_META[l.status]?.label||l.status}</div>${note?`<div class="log-note">📝 ${note}</div>`:''}<div class="log-time">🕐 ${fmtDate(l.created_at)}</div></div></div>`;
      }).join('')
    :'<div style="color:#64748b;font-size:.78rem;text-align:center;padding:14px;">لا يوجد سجل حركات بعد</div>';

  const routeHtml=route.length>0?route.map((r,i)=>{
    const isFirst=i===0,isLast=i===route.length-1;
    const dotCls=r.status==='done'?'done-rt':isFirst?'origin':isLast?'dest':'waypoint';
    const stLbl=r.status==='done'?'✅ وصلت':r.status==='current'?'📍 هنا الآن':'⏳ في الانتظار';
    const stCls=r.status==='done'?'done':r.status==='current'?'current':'pending';
    return`<div class="route-step"><div class="route-dot-wrap"><div class="route-dot ${dotCls}">${isFirst?'📤':isLast?'📥':'🔄'}</div>${i<route.length-1?'<div class="route-line"></div>':''}</div><div class="route-info"><div class="route-name">${r.branch_name}</div><div class="route-status ${stCls}">${stLbl}</div>${r.arrived_at?`<div style="font-size:.62rem;color:#475569;margin-top:2px;">🕐 ${fmtDate(r.arrived_at)}</div>`:''}</div></div>`;
  }).join(''):'';

  const trackUrl=`${location.origin}${location.pathname}?t=${ship.tracking_number}`;

  // نقطة 5: معلومات محدودة للعميل — بدون رقم هاتف المرسل/المستلم الكامل، بدون بيانات السائق
  document.getElementById('result-area').innerHTML=`
    <div class="result-card">
      <div class="status-banner ${meta.cls}">
        <div class="status-main">
          <div class="status-icon">${STATUS_FLOW.find(s=>s.key===ship.status)?.icon||(ship.status==='cancelled'?'❌':'📦')}</div>
          <div class="status-text">
            <h3 style="color:${meta.color};">${meta.label}</h3>
            <p>${STATUS_FLOW.find(s=>s.key===ship.status)?.sub||''}</p>
          </div>
        </div>
        <div class="track-code">${ship.tracking_number}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-steps">
          <div class="progress-line"></div>
          <div class="progress-fill" style="width:${fillPct}%"></div>
          ${tlSteps}
        </div>
      </div>
      <div class="info-section">
        <div class="info-section-title">📋 تفاصيل الشحنة</div>
        <div class="info-grid">
          <div class="info-box">
            <div class="info-box-title">📤 من</div>
            <div class="info-row"><span class="info-lbl">الفرع</span><span class="info-val">${ship.origin?.name||'—'}</span></div>
            <div class="info-row"><span class="info-lbl">المدينة</span><span class="info-val">${ship.origin?.city||'—'}</span></div>
          </div>
          <div class="info-box">
            <div class="info-box-title">📥 إلى</div>
            <div class="info-row"><span class="info-lbl">الفرع</span><span class="info-val">${ship.destination?.name||'—'}</span></div>
            <div class="info-row"><span class="info-lbl">المدينة</span><span class="info-val">${ship.destination?.city||'—'}</span></div>
          </div>
          <div class="info-box">
            <div class="info-box-title">💰 المالية</div>
            <div class="info-row"><span class="info-lbl">التكلفة</span><span class="info-val" style="color:#34d399;font-weight:700;">${(ship.shipping_cost||0).toLocaleString()} ﷼</span></div>
            <div class="info-row"><span class="info-lbl">الدفع</span><span class="info-val">${PAY_AR[ship.payment_method]||'—'}</span></div>
          </div>
          <div class="info-box">
            <div class="info-box-title">🚚 التسليم</div>
            <div class="info-row"><span class="info-lbl">الطريقة</span><span class="info-val">${DELIVERY_AR[ship.delivery_type]||'—'}</span></div>
            <div class="info-row"><span class="info-lbl">التاريخ</span><span class="info-val">${fmtDateShort(ship.created_at)}</span></div>
            ${ship.delivered_at?`<div class="info-row"><span class="info-lbl">التسليم</span><span class="info-val" style="color:#34d399;">${fmtDateShort(ship.delivered_at)}</span></div>`:''}
          </div>
        </div>
        ${ship.notes?`<div style="margin-top:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(37,99,235,.1);border-radius:8px;font-size:.76rem;color:#94a3b8;">📝 ${ship.notes}</div>`:''}
      </div>
      ${routeHtml?`<div class="route-section"><div class="info-section-title">🗺️ مسار الشحنة</div>${routeHtml}</div>`:''}
      <div class="logs-section">
        <div class="info-section-title">📋 سجل التحركات</div>
        ${logsHtml}
      </div>
      ${proof?`
      <div class="proof-section">
        <div class="info-section-title">✅ إثبات التسليم</div>
        <div class="proof-card">
          <div class="proof-header">
            <div class="proof-icon">✅</div>
            <div><div class="proof-title">تم التسليم بنجاح</div><div class="proof-sub">استلمها: ${proof.receiver_name||'—'} — ${fmtDate(proof.created_at)}</div></div>
          </div>
          <div class="proof-badges">
            <span class="proof-badge badge-photo">📷 صورة التسليم محفوظة</span>
            <span class="proof-badge badge-sig">✍️ توقيع المستلم محفوظ</span>
            <span class="proof-badge badge-ok">✅ مؤكّد</span>
          </div>
          ${proof.notes?`<div style="font-size:.72rem;color:#94a3b8;margin-top:10px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;">📝 ${proof.notes}</div>`:''}
        </div>
      </div>`:''}
      <div class="share-section">
        <div class="share-title">مشاركة رابط التتبع</div>
        <div class="share-row">
          <button class="share-btn btn-wa" onclick="shareWA('${ship.tracking_number}','${ship.receiver_name}')">📱 واتساب</button>
          <button class="share-btn btn-copy" onclick="copyLink('${ship.tracking_number}')">🔗 نسخ الرابط</button>
          <button class="share-btn btn-print" onclick="window.print()">🖨️ طباعة</button>
        </div>
        <div class="qr-wrap">
          <canvas id="qr-canvas" width="130" height="130"></canvas>
          <p>امسح للتتبع الفوري</p>
        </div>
      </div>
    </div>`;

  setTimeout(()=>{
    const canvas=document.getElementById('qr-canvas');
    if(canvas&&QR)QR.drawQR(canvas,trackUrl,{darkColor:'#1d4ed8'});
  },100);
}

function subscribeShipment(id){
  if(realtimeCh)sb.removeChannel(realtimeCh);
  realtimeCh=sb.channel('track-'+id).on('postgres_changes',{event:'UPDATE',schema:'public',table:'shipments',filter:'id=eq.'+id},async payload=>{
    currentShip={...currentShip,...payload.new};
    const[logsRes,routeRes,proofRes]=await Promise.all([
      sb.from('tracking_logs').select('status,location_note,created_at').eq('shipment_id',id).order('created_at',{ascending:false}),
      sb.from('shipment_routes').select('branch_name,sequence,status,arrived_at').eq('shipment_id',id).order('sequence'),
      currentShip.delivery_proof_id?sb.from('delivery_proofs').select('receiver_name,created_at,notes').eq('id',currentShip.delivery_proof_id).single():Promise.resolve({data:null}),
    ]);
    renderShipment(currentShip,logsRes.data||[],routeRes.data||[],proofRes.data);
  }).subscribe();
}

// نقطة 5: واتساب بدون رقم هاتف مباشر
window.shareWA=function(tn,name){
  const url=`${location.origin}${location.pathname}?t=${tn}`;
  const msg=`📦 *تتبع شحنتك*\n\nعزيزي ${name}،\nرقم التتبع: *${tn}*\n\n🔗 تابع شحنتك:\n${url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};
window.copyLink=function(tn){
  const url=`${location.origin}${location.pathname}?t=${tn}`;
  navigator.clipboard.writeText(url).then(()=>showToast('✅ تم نسخ رابط التتبع'));
};

function showLoading(){document.getElementById('result-area').innerHTML='<div class="ldg"><div class="spin"></div><span style="color:#64748b;font-size:.82rem;">جاري البحث عن شحنتك...</span></div>';}
function showEmpty(q){document.getElementById('result-area').innerHTML=`<div class="empty-card"><div class="empty-ico">🔍</div><h3>لم يتم العثور على الشحنة</h3><p>لا توجد شحنة برقم التتبع<br><strong style="color:#60a5fa;">"${q}"</strong></p><p style="margin-top:12px;">تأكد من كتابة الرقم بشكل صحيح</p><div class="empty-hint">مثال: AD-SN-000001</div></div>`;}

// نقطة 23: صفحة انتهاء صلاحية التتبع
function showExpired(tn,deliveredDate){
  document.getElementById('result-area').innerHTML=`
    <div class="expired-banner">
      <h3>🔒 انتهت صلاحية رابط التتبع</h3>
      <p>هذه الشحنة تم تسليمها في ${fmtDateShort(deliveredDate.toISOString())}</p>
      <p style="margin-top:6px;font-size:.72rem;">صلاحية التتبع ${TRACKING_EXPIRY_HOURS} ساعة بعد التسليم النهائي</p>
    </div>
    <div class="empty-card"><div class="empty-ico">📦</div><h3>الشحنة مكتملة</h3><p>تم تسليم الشحنة بنجاح<br>وانتهت فترة التتبع المتاحة</p></div>`;
}

function showToast(msg){const old=document.querySelector('.toast-pop');if(old)old.remove();const el=document.createElement('div');el.className='toast-pop';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleString('ar-YE',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtDateShort(d){if(!d)return'—';return new Date(d).toLocaleDateString('ar-YE',{month:'short',day:'numeric',year:'numeric'});}
</script>
