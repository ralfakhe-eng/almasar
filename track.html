<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
html,body{min-height:100%;background:#070d1c;color:#e2e8f0;}
body{overflow-x:hidden;overflow-y:scroll;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(37,99,235,.15) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 80% 80%,rgba(16,185,129,.1) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(37,99,235,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.05) 1px,transparent 1px);
  background-size:50px 50px;}
.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:24px 16px;}
.site-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding:14px 18px;
  background:rgba(13,21,40,.85);border:1px solid rgba(37,99,235,.2);border-radius:14px;backdrop-filter:blur(10px);}
.site-hdr .brand{display:flex;align-items:center;gap:10px;}
.brand-ico{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1d4ed8,#2563eb);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.brand h1{font-size:.95rem;font-weight:700;color:#e2e8f0;}
.brand p{font-size:.65rem;color:#64748b;}
.hdr-btns{display:flex;gap:8px;}
.hbtn{padding:7px 14px;border-radius:8px;font-size:.75rem;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s;}
.hbtn-outline{background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(37,99,235,.2);}
.hbtn-outline:hover{background:rgba(37,99,235,.1);color:#60a5fa;}
.search-card{background:rgba(13,21,40,.9);border:1px solid rgba(37,99,235,.25);border-radius:18px;
  padding:28px 24px;margin-bottom:20px;backdrop-filter:blur(12px);}
.search-card h2{font-size:1.3rem;font-weight:700;margin-bottom:6px;}
.search-card p{font-size:.82rem;color:#64748b;margin-bottom:20px;}
.search-row{display:flex;gap:10px;}
.sinp{flex:1;padding:12px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(37,99,235,.25);
  border-radius:11px;color:#e2e8f0;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.sinp:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.sinp::placeholder{color:#475569;}
.sbtn{padding:12px 22px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:11px;
  color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .25s;
  white-space:nowrap;box-shadow:0 4px 14px rgba(37,99,235,.35);}
.sbtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.45);}
.sbtn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.ldg{display:flex;flex-direction:column;align-items:center;padding:48px;gap:14px;}
.spin{width:36px;height:36px;border:3px solid rgba(59,130,246,.2);border-top-color:#3b82f6;
  border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.res-card{background:rgba(13,21,40,.9);border:1px solid rgba(37,99,235,.2);border-radius:16px;
  overflow:hidden;margin-bottom:16px;backdrop-filter:blur(10px);}
.res-hdr{padding:16px 20px;border-bottom:1px solid rgba(37,99,235,.15);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.track-num{font-size:1.3rem;font-weight:900;color:#60a5fa;font-family:monospace;letter-spacing:2px;}
.res-body{padding:20px;}
.tl-wrap{margin:20px 0;}
.tl-bar{display:flex;align-items:center;justify-content:space-between;position:relative;margin-bottom:8px;}
.tl-bar::before{content:'';position:absolute;top:18px;right:18px;left:18px;height:3px;
  background:rgba(37,99,235,.15);border-radius:99px;z-index:0;}
.tl-fill{position:absolute;top:18px;right:18px;height:3px;
  background:linear-gradient(90deg,#2563eb,#10b981);border-radius:99px;z-index:1;transition:width 1s ease;}
.tl-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative;z-index:2;}
.tl-dot{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.1);
  background:#0d1526;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .4s;}
.tl-dot.done{background:linear-gradient(135deg,#1e40af,#2563eb);border-color:#3b82f6;box-shadow:0 0 14px rgba(59,130,246,.4);}
.tl-dot.active{background:linear-gradient(135deg,#065f46,#059669);border-color:#10b981;
  box-shadow:0 0 18px rgba(16,185,129,.5);animation:pulse 2s infinite;}
.tl-dot.cncl{background:linear-gradient(135deg,#7f1d1d,#ef4444);border-color:#ef4444;}
@keyframes pulse{0%,100%{box-shadow:0 0 18px rgba(16,185,129,.5);}50%{box-shadow:0 0 28px rgba(16,185,129,.8);}}
.tl-lbl{font-size:.66rem;color:#64748b;text-align:center;font-weight:600;}
.tl-lbl.done,.tl-lbl.active{color:#e2e8f0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.info-box{background:rgba(255,255,255,.03);border:1px solid rgba(37,99,235,.12);border-radius:11px;padding:13px;}
.info-box h4{font-size:.68rem;color:#64748b;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:9px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);}
.info-row:last-child{border-bottom:none;}
.info-row .lbl{font-size:.72rem;color:#64748b;}
.info-row .val{font-size:.78rem;font-weight:600;color:#e2e8f0;text-align:left;}
.logs-box{background:rgba(255,255,255,.02);border:1px solid rgba(37,99,235,.12);border-radius:11px;padding:13px;}
.logs-box h4{font-size:.68rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.log-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.log-item:last-child{border-bottom:none;}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.log-txt{flex:1;}
.log-st{font-size:.74rem;font-weight:700;}
.log-note{font-size:.7rem;color:#94a3b8;margin-top:2px;}
.log-time{font-size:.65rem;color:#64748b;margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:99px;font-size:.72rem;font-weight:700;}
.badge::before{content:'●';font-size:.45rem;}
.bpend{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2);}
.bpick{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2);}
.btran{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2);}
.bdeli{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2);}
.bcanc{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.act-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.abtn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;
  font-size:.78rem;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s;}
.abtn-wa{background:#25D366;color:#fff;}
.abtn-wa:hover{background:#1ebe5c;}
.abtn-copy{background:rgba(37,99,235,.12);color:#60a5fa;border:1px solid rgba(37,99,235,.25);}
.abtn-copy:hover{background:rgba(37,99,235,.2);}
.abtn-print{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.1);}
.abtn-print:hover{background:rgba(255,255,255,.1);}
.qr-box{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.03);
  border:1px solid rgba(37,99,235,.12);border-radius:11px;padding:16px;margin-top:12px;}
.qr-box p{font-size:.68rem;color:#64748b;margin-top:6px;}
.empty-card{text-align:center;padding:48px 24px;background:rgba(13,21,40,.7);
  border:1px solid rgba(37,99,235,.15);border-radius:16px;}
.empty-ico{font-size:3rem;margin-bottom:12px;}
.empty-card h3{font-size:1rem;font-weight:700;margin-bottom:6px;}
.empty-card p{font-size:.8rem;color:#64748b;}
.site-ftr{text-align:center;padding:24px 0;font-size:.72rem;color:#334155;margin-top:20px;}
@media print{
  body{background:#fff!important;color:#111!important;}
  body::before,body::after{display:none!important;}
  .site-hdr,.search-card,.act-row,.hbtn,.site-ftr{display:none!important;}
  .res-card{background:#fff!important;border:1px solid #ddd!important;}
  .track-num{color:#1d4ed8!important;}
}
@media(max-width:600px){
  .search-row{flex-direction:column;}
  .info-grid{grid-template-columns:1fr;}
  .track-num{font-size:1rem;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="site-hdr">
    <div class="brand">
      <div class="brand-ico">🚚</div>
      <div><h1>المسار السريع</h1><p>تتبع شحنتك</p></div>
    </div>
    <div class="hdr-btns">
      <button class="hbtn hbtn-outline" onclick="window.location.href='index.html'">🔑 تسجيل الدخول</button>
    </div>
  </div>

  <div class="search-card">
    <h2>📡 تتبع شحنتك</h2>
    <p>أدخل رقم التتبع لمعرفة حالة شحنتك فوراً</p>
    <div class="search-row">
      <input type="text" id="sinp" class="sinp"
        placeholder="مثال: AD-SN-000001"
        autocomplete="off" autocorrect="off" spellcheck="false"
        style="text-transform:uppercase;">
      <button class="sbtn" id="sbtn" onclick="doSearch()">🔍 تتبع</button>
    </div>
  </div>

  <div id="result-area"></div>

  <div class="site-ftr">المسار السريع — جميع الحقوق محفوظة</div>
</div>

<script type="module">
const sb = window._sb;

const STATUS_FLOW = [
  {key:'pending',    icon:'⏳', label:'انتظار'},
  {key:'picked_up',  icon:'✅', label:'استلام'},
  {key:'in_transit', icon:'🚚', label:'في الطريق'},
  {key:'delivered',  icon:'🏁', label:'تسليم'},
];
const STATUS_META = {
  pending:    {label:'قيد الانتظار', cls:'bpend', color:'#fbbf24'},
  picked_up:  {label:'تم الاستلام',  cls:'bpick', color:'#60a5fa'},
  in_transit: {label:'في الطريق',    cls:'btran', color:'#a78bfa'},
  delivered:  {label:'تم التسليم',   cls:'bdeli', color:'#34d399'},
  cancelled:  {label:'ملغية',        cls:'bcanc', color:'#f87171'},
};

let currentShip = null;
let realtimeCh  = null;

// ═══ من URL — رقم التتبع فقط ═══
const urlP  = new URLSearchParams(location.search);
const paramT = urlP.get('t') || urlP.get('tracking');
if (paramT) {
  document.getElementById('sinp').value = paramT.toUpperCase();
  doSearch();
}

document.getElementById('sinp').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ═══ بحث برقم التتبع فقط ═══
window.doSearch = async function() {
  const q = document.getElementById('sinp').value.trim().toUpperCase();
  if (!q) return;

  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  btn.textContent = '...';
  showLoading();

  await searchByTracking(q);

  btn.disabled = false;
  btn.textContent = '🔍 تتبع';
};

async function searchByTracking(tn) {
  const { data, error } = await sb.from('shipments').select(`
    id,tracking_number,sender_name,sender_phone,
    receiver_name,receiver_phone,receiver_address,
    status,created_at,shipping_cost,payment_method,notes,
    delivery_type,delivered_at,delivery_proof_id,
    origin:origin_branch_id(name,city),
    destination:destination_branch_id(name,city),
    driver:driver_id(full_name,phone)
  `).ilike('tracking_number', tn).single();

  if (error || !data) { showEmpty(tn); return; }

  currentShip = data;

  const { data: logs } = await sb.from('tracking_logs')
    .select('status,location_note,created_at')
    .eq('shipment_id', data.id)
    .order('created_at', { ascending: false });

  // جلب إثبات التسليم إن وجد
  let proof = null;
  if (data.status === 'delivered' && data.delivery_proof_id) {
    const { data: p } = await sb.from('delivery_proofs')
      .select('receiver_name,created_at,notes')
      .eq('id', data.delivery_proof_id).single();
    proof = p;
  }

  renderShipment(data, logs || [], proof);
  subscribeShipment(data.id);
}

// ═══ عرض الشحنة ═══
function renderShipment(ship, logs, proof) {
  const meta    = STATUS_META[ship.status] || STATUS_META['pending'];
  const idx     = STATUS_FLOW.findIndex(s => s.key === ship.status);
  const fillPct = ship.status === 'cancelled' ? 0
    : idx < 0 ? 0 : Math.round((idx / (STATUS_FLOW.length - 1)) * 100);

  const plb = {
    cash_sender:   'نقد من المرسل',
    cash_receiver: 'الدفع عند الاستلام',
    prepaid:       'مدفوع مسبقاً'
  };

  const tlSteps = ship.status === 'cancelled'
    ? `<div class="tl-step"><div class="tl-dot cncl">❌</div><span class="tl-lbl active">ملغية</span></div>`
    : STATUS_FLOW.map((s, i) => {
        const done   = i < idx;
        const active = i === idx;
        const cls    = done ? 'done' : active ? 'active' : '';
        return `<div class="tl-step">
          <div class="tl-dot ${cls}">${done ? '✓' : s.icon}</div>
          <span class="tl-lbl ${cls}">${s.label}</span>
        </div>`;
      }).join('');

  const logsHtml = logs.length
    ? logs.map(l => `
      <div class="log-item">
        <div class="log-dot" style="background:${STATUS_META[l.status]?.color || '#64748b'}"></div>
        <div class="log-txt">
          <div class="log-st">${STATUS_META[l.status]?.label || l.status}</div>
          ${l.location_note ? `<div class="log-note">📝 ${l.location_note}</div>` : ''}
          <div class="log-time">🕐 ${fmtDate(l.created_at)}</div>
        </div>
      </div>`).join('')
    : '<div style="color:#64748b;font-size:.78rem;text-align:center;padding:12px;">لا يوجد سجل حركات بعد</div>';

  const trackUrl = `${location.origin}${location.pathname}?t=${ship.tracking_number}`;

  document.getElementById('result-area').innerHTML = `
    <div class="res-card">
      <div class="res-hdr">
        <div>
          <div class="track-num">${ship.tracking_number}</div>
          <div style="font-size:.72rem;color:#64748b;margin-top:3px;">
            تاريخ الإنشاء: ${fmtDate(ship.created_at)}
          </div>
        </div>
        <span class="badge ${meta.cls}">${meta.label}</span>
      </div>
      <div class="res-body">
        <div class="tl-wrap">
          <div class="tl-bar">
            <div class="tl-fill" style="width:${fillPct}%"></div>
            ${tlSteps}
          </div>
        </div>
        <div class="info-grid">
          <div class="info-box">
            <h4>📤 المرسل</h4>
            <div class="info-row"><span class="lbl">الاسم</span><span class="val">${ship.sender_name}</span></div>
            <div class="info-row"><span class="lbl">الجوال</span><span class="val">${ship.sender_phone || '—'}</span></div>
            <div class="info-row"><span class="lbl">الفرع</span><span class="val">${ship.origin?.name || '—'}</span></div>
            <div class="info-row"><span class="lbl">المدينة</span><span class="val">${ship.origin?.city || '—'}</span></div>
          </div>
          <div class="info-box">
            <h4>📥 المستلم</h4>
            <div class="info-row"><span class="lbl">الاسم</span><span class="val">${ship.receiver_name}</span></div>
            <div class="info-row"><span class="lbl">الجوال</span><span class="val">${ship.receiver_phone || '—'}</span></div>
            <div class="info-row"><span class="lbl">العنوان</span><span class="val">${ship.receiver_address || '—'}</span></div>
            <div class="info-row"><span class="lbl">الفرع</span><span class="val">${ship.destination?.name || '—'}</span></div>
          </div>
          <div class="info-box">
            <h4>🚛 السائق</h4>
            <div class="info-row"><span class="lbl">الاسم</span><span class="val">${ship.driver?.full_name || 'لم يُعيَّن'}</span></div>
            <div class="info-row"><span class="lbl">الجوال</span><span class="val">${ship.driver?.phone || '—'}</span></div>
          </div>
          <div class="info-box">
            <h4>💰 المالية</h4>
            <div class="info-row">
              <span class="lbl">التكلفة</span>
              <span class="val" style="color:#34d399;">${(ship.shipping_cost || 0).toLocaleString()} ﷼</span>
            </div>
            <div class="info-row"><span class="lbl">طريقة الدفع</span><span class="val">${plb[ship.payment_method] || '—'}</span></div>
            ${ship.notes ? `<div class="info-row"><span class="lbl">ملاحظات</span><span class="val">${ship.notes}</span></div>` : ''}
          </div>
        </div>
        <div class="logs-box">
          <h4>📋 سجل التحركات</h4>
          ${logsHtml}
        </div>
        ${proof ? `
        <div style="margin-top:12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:14px;">
          <div style="font-size:.72rem;font-weight:700;color:#34d399;margin-bottom:8px;">
            ✅ تم التسليم بنجاح
          </div>
          <div style="font-size:.78rem;color:#e2e8f0;margin-bottom:4px;">
            👤 استلم الشحنة: <strong>${proof.receiver_name||'—'}</strong>
          </div>
          <div style="font-size:.68rem;color:#64748b;">
            🕐 ${fmtDate(proof.created_at)}
          </div>
          ${proof.notes ? `<div style="font-size:.72rem;color:#94a3b8;margin-top:6px;">📝 ${proof.notes}</div>` : ''}
          <div style="margin-top:8px;display:flex;align-items:center;gap:6px;font-size:.7rem;color:#34d399;">
            <span>📷 صورة محفوظة</span>
            <span>•</span>
            <span>✍️ توقيع محفوظ</span>
          </div>
        </div>` : ''}
        <div class="qr-box">
          <canvas id="qr-canvas"></canvas>
          <p>امسح للمشاركة الفورية</p>
        </div>
        <div class="act-row">
          <button class="abtn abtn-wa"
            onclick="shareWA('${ship.tracking_number}','${(ship.receiver_phone || '').replace(/^\+/, '')}','${ship.receiver_name}')">
            📱 إرسال للمستلم
          </button>
          <button class="abtn abtn-copy" onclick="copyLink('${ship.tracking_number}')">🔗 نسخ الرابط</button>
          <button class="abtn abtn-print" onclick="window.print()">🖨️ طباعة</button>
        </div>
      </div>
    </div>`;

  genQR(ship.tracking_number);
}

// ═══ Realtime — تحديث تلقائي عند تغيير الحالة ═══
function subscribeShipment(id) {
  if (realtimeCh) sb.removeChannel(realtimeCh);
  realtimeCh = sb.channel('track-' + id)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public',
      table: 'shipments', filter: `id=eq.${id}`
    }, async payload => {
      currentShip = { ...currentShip, ...payload.new };
      const { data: logs } = await sb.from('tracking_logs')
        .select('status,location_note,created_at')
        .eq('shipment_id', id)
        .order('created_at', { ascending: false });
      let proof = null;
      if (currentShip.status === 'delivered' && currentShip.delivery_proof_id) {
        const { data: p } = await sb.from('delivery_proofs')
          .select('receiver_name,created_at,notes')
          .eq('id', currentShip.delivery_proof_id).single();
        proof = p;
      }
      renderShipment(currentShip, logs || [], proof);
    }).subscribe();
}

// ═══ QR ═══
function genQR(tn) {
  const url    = `${location.origin}${location.pathname}?t=${tn}`;
  const tryGen = (n = 0) => {
    const canvas = document.getElementById('qr-canvas');
    if (!canvas) return;
    if (typeof QRCode !== 'undefined') {
      QRCode.toCanvas(canvas, url, {
        width: 130, margin: 1,
        color: { dark: '#1d4ed8', light: '#ffffff' }
      }, () => {});
    } else if (n < 20) {
      setTimeout(() => tryGen(n + 1), 200);
    }
  };
  setTimeout(tryGen, 100);
}

// ═══ Actions ═══
window.shareWA = function(tn, phone, name) {
  const url = `${location.origin}${location.pathname}?t=${tn}`;
  const msg = `📦 *شحنتك في الطريق*\n\nعزيزي ${name}،\nرقم التتبع: *${tn}*\n\n🔗 تتبع شحنتك:\n${url}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
};

window.copyLink = function(tn) {
  const url = `${location.origin}${location.pathname}?t=${tn}`;
  navigator.clipboard.writeText(url).then(() => showToast('✅ تم نسخ الرابط'));
};

// ═══ Helpers ═══
function showLoading() {
  document.getElementById('result-area').innerHTML =
    `<div class="ldg"><div class="spin"></div><span style="color:#64748b;font-size:.82rem;">جاري البحث...</span></div>`;
}

function showEmpty(q) {
  document.getElementById('result-area').innerHTML = `
    <div class="empty-card">
      <div class="empty-ico">🔍</div>
      <h3>لم يتم العثور على نتائج</h3>
      <p style="margin-top:8px;">${q ? `لا توجد شحنة برقم التتبع "${q}"` : 'تأكد من رقم التتبع'}</p>
      <p style="margin-top:16px;font-size:.75rem;color:#475569;">
        تأكد من كتابة رقم التتبع بشكل صحيح — مثال: AD-SN-000001
      </p>
    </div>`;
}

function showToast(msg) {
  const el = document.createElement('div');
  el.style.cssText =
    'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);' +
    'background:rgba(13,21,40,.97);border:1px solid rgba(16,185,129,.4);' +
    'color:#34d399;padding:12px 22px;border-radius:10px;font-size:.85rem;' +
    'font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.5);';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('ar-YE', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
